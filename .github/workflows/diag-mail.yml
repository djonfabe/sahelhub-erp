name: Diagnostic Mail

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Diagnostiquer et corriger l'envoi d'email
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /var/www/sahelhub

            echo "════════════════════════════════════════"
            echo "  DIAGNOSTIC EMAIL"
            echo "════════════════════════════════════════"

            # ── 1. Postfix ────────────────────────────────────────────────
            echo ""
            echo "── 1. Statut Postfix ──"
            systemctl is-active postfix && echo "✅ Postfix actif" || echo "❌ Postfix INACTIF"
            postconf inet_interfaces
            postconf mydestination
            postconf smtpd_tls_security_level 2>/dev/null

            # ── 2. Paramètres SMTP en base ────────────────────────────────
            echo ""
            echo "── 2. Paramètres SMTP en base ──"
            php artisan tinker --execute="
              \$admin = App\Models\User::where('type','superadmin')->first();
              if (!\$admin) { echo 'superadmin introuvable'; exit; }
              \$keys = ['email_driver','email_host','email_port','email_encryption','email_fromAddress'];
              foreach (\$keys as \$k) {
                \$v = DB::table('settings')->where('key',\$k)->where('created_by',\$admin->id)->value('value');
                echo \$k . ' : ' . (\$v ?? '(non défini)') . PHP_EOL;
              }
            " 2>&1

            # ── 3. Test SMTP direct (Mail::raw) ───────────────────────────
            echo ""
            echo "── 3. Test envoi direct Mail::raw ──"
            php artisan tinker --execute="
              \$admin = App\Models\User::where('type','superadmin')->first();
              SetConfigEmail(\$admin->id);
              echo 'driver : ' . config('mail.default') . PHP_EOL;
              echo 'host   : ' . config('mail.mailers.smtp.host') . PHP_EOL;
              echo 'port   : ' . config('mail.mailers.smtp.port') . PHP_EOL;
              echo 'encr   : ' . config('mail.mailers.smtp.encryption') . PHP_EOL;
              Illuminate\Support\Facades\Mail::raw(
                'Test diagnostic SahelHub — ' . now(),
                function(\$m) {
                  \$m->to('djonfabetamibepascal@gmail.com')
                     ->subject('[Diag] SahelHub mail test');
                }
              );
              echo '✅ Mail envoyé sans exception' . PHP_EOL;
            " 2>&1

            # ── 4. Log Postfix ────────────────────────────────────────────
            echo ""
            echo "── 4. 30 dernières lignes mail.log ──"
            sleep 3
            tail -30 /var/log/mail.log 2>/dev/null || \
            journalctl -u postfix --no-pager -n 30 2>/dev/null || \
            echo "(log indisponible)"

            # ── 5. File d'attente ─────────────────────────────────────────
            echo ""
            echo "── 5. Queue Postfix ──"
            mailq 2>/dev/null | head -10 || echo "(queue vide)"
