name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, fileinfo, pdo_mysql, exif, gd, zip, bcmath
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy .env
        run: cp .env.example .env

      - name: Configure environment for testing
        run: |
          echo "DB_CONNECTION=mysql"     >> .env
          echo "DB_HOST=127.0.0.1"       >> .env
          echo "DB_PORT=3306"            >> .env
          echo "DB_DATABASE=testing"     >> .env
          echo "DB_USERNAME=root"        >> .env
          echo "DB_PASSWORD=password"    >> .env
          echo "CACHE_STORE=array"       >> .env
          echo "SESSION_DRIVER=array"    >> .env
          echo "QUEUE_CONNECTION=sync"   >> .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Create storage/installed to bypass installer middleware
        run: echo "install $(date)" > storage/installed

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests
        run: php artisan test --stop-on-failure

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, fileinfo, pdo_mysql, exif, gd, zip, bcmath
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build
