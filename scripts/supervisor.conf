; /etc/supervisor/conf.d/sahelhub.conf

; Queue worker — processes jobs from the database queue
[program:sahelhub-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/sahelhub/artisan queue:work database --sleep=3 --tries=3 --max-time=3600 --queue=default,emails,webhooks
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/log/supervisor/sahelhub-worker.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
stopwaitsecs=3600

; Scheduler — runs every minute (replaces a cron entry for the Laravel scheduler)
[program:sahelhub-scheduler]
process_name=%(program_name)s
command=bash -c "while true; do php /var/www/sahelhub/artisan schedule:run >> /dev/null 2>&1; sleep 60; done"
autostart=true
autorestart=true
user=www-data
redirect_stderr=true
stdout_logfile=/var/log/supervisor/sahelhub-scheduler.log
stdout_logfile_maxbytes=5MB
stdout_logfile_backups=3
