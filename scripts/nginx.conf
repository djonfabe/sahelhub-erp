# /etc/nginx/sites-available/sahelhub.com
# Symlink to sites-enabled: ln -s /etc/nginx/sites-available/sahelhub.com /etc/nginx/sites-enabled/

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name sahelhub.com www.sahelhub.com;
    return 301 https://sahelhub.com$request_uri;
}

# Redirect www → non-www over HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.sahelhub.com;

    ssl_certificate     /etc/letsencrypt/live/sahelhub.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sahelhub.com/privkey.pem;

    return 301 https://sahelhub.com$request_uri;
}

# Main server block
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name sahelhub.com;

    root /var/www/sahelhub/public;
    index index.php;

    ssl_certificate     /etc/letsencrypt/live/sahelhub.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sahelhub.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"           always;
    add_header X-Content-Type-Options    "nosniff"              always;
    add_header X-XSS-Protection          "1; mode=block"        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # Hide server version
    server_tokens off;

    # Max upload size (match Laravel's maxUploadSize setting)
    client_max_body_size 50M;

    # Block direct access to installer lock file
    location = /storage/installed {
        deny all;
        return 403;
    }

    # Block dotfiles except Let's Encrypt challenge
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Static assets — long cache, no PHP
    location ~* \.(css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass   unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_read_timeout 300;
    }

    # Logs
    access_log /var/log/nginx/sahelhub.access.log;
    error_log  /var/log/nginx/sahelhub.error.log;
}
