<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SahelHub">
  <defs>
    <linearGradient id="warm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4B23E"/>
      <stop offset="55%" stop-color="#E0762A"/>
      <stop offset="100%" stop-color="#C2461A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="32" height="32" rx="7" fill="#13443B"/>

  <!-- Hub spokes -->
  <g stroke="#E0762A" stroke-width="1.2" stroke-linecap="round" opacity="0.55">
    <line x1="16" y1="16" x2="16"    y2="5"/>
    <line x1="16" y1="16" x2="24.79" y2="10.5"/>
    <line x1="16" y1="16" x2="24.79" y2="21.5"/>
    <line x1="16" y1="16" x2="16"    y2="27"/>
    <line x1="16" y1="16" x2="7.21"  y2="21.5"/>
    <line x1="16" y1="16" x2="7.21"  y2="10.5"/>
  </g>

  <!-- Hexagon outline -->
  <polygon points="16,5 24.79,10.5 24.79,21.5 16,27 7.21,21.5 7.21,10.5"
           fill="none" stroke="url(#warm)" stroke-width="1.6" stroke-linejoin="round"/>

  <!-- Vertex dots -->
  <g fill="#F4B23E">
    <circle cx="16"    cy="5"    r="1.9"/>
    <circle cx="24.79" cy="10.5" r="1.9"/>
    <circle cx="24.79" cy="21.5" r="1.9"/>
    <circle cx="16"    cy="27"   r="1.9"/>
    <circle cx="7.21"  cy="21.5" r="1.9"/>
    <circle cx="7.21"  cy="10.5" r="1.9"/>
  </g>

  <!-- Centre hub -->
  <circle cx="16" cy="16" r="4.5" fill="url(#warm)"/>
  <circle cx="16" cy="16" r="2"   fill="#FFF7EA"/>
</svg>
