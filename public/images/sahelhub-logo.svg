<svg width="131" height="32" viewBox="0 0 131 32" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SahelHub">
  <defs>
    <linearGradient id="warm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4B23E"/>
      <stop offset="55%" stop-color="#E0762A"/>
      <stop offset="100%" stop-color="#C2461A"/>
    </linearGradient>
    <linearGradient id="coreg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBD27E"/>
      <stop offset="100%" stop-color="#E0762A"/>
    </linearGradient>
  </defs>

  <!-- ICON : hub + modules -->
  <g>
    <g stroke="url(#warm)" stroke-width="1.6" stroke-linecap="round" opacity="0.95">
      <line x1="16" y1="16" x2="16"    y2="4"/>
      <line x1="16" y1="16" x2="26.39" y2="10"/>
      <line x1="16" y1="16" x2="26.39" y2="22"/>
      <line x1="16" y1="16" x2="16"    y2="28"/>
      <line x1="16" y1="16" x2="5.61"  y2="22"/>
      <line x1="16" y1="16" x2="5.61"  y2="10"/>
    </g>
    <polygon points="16,4 26.39,10 26.39,22 16,28 5.61,22 5.61,10"
             fill="none" stroke="#13443B" stroke-width="1.6" stroke-linejoin="round" opacity="0.92"/>
    <g fill="#13443B">
      <circle cx="26.39" cy="10" r="2.3"/><circle cx="26.39" cy="22" r="2.3"/>
      <circle cx="16" cy="28" r="2.3"/><circle cx="5.61" cy="22" r="2.3"/>
      <circle cx="5.61" cy="10" r="2.3"/>
    </g>
    <circle cx="16" cy="4" r="2.8" fill="url(#coreg)"/>
    <circle cx="16" cy="16" r="5.4" fill="url(#warm)"/>
    <circle cx="16" cy="16" r="2.2" fill="#FFF7EA"/>
  </g>

  <!-- WORDMARK -->
  <text x="37" y="22" font-family="'Poppins','Montserrat','Segoe UI',Arial,sans-serif"
        font-size="17" font-weight="600" letter-spacing="-0.8" fill="#13443B">Sahel<tspan fill="url(#warm)" font-weight="700">Hub</tspan></text>
</svg>
