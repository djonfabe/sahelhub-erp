<svg width="140" height="36" viewBox="0 0 140 36" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SahelHub">
  <defs>
    <linearGradient id="warm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4B23E"/>
      <stop offset="55%" stop-color="#E0762A"/>
      <stop offset="100%" stop-color="#C2461A"/>
    </linearGradient>
  </defs>

  <!-- Icon background -->
  <rect x="0" y="0" width="36" height="36" rx="8" fill="#13443B"/>

  <!-- Hub spokes -->
  <g stroke="#E0762A" stroke-width="1.3" stroke-linecap="round" opacity="0.55">
    <line x1="18" y1="18" x2="18"    y2="6.5"/>
    <line x1="18" y1="18" x2="27.86" y2="12.25"/>
    <line x1="18" y1="18" x2="27.86" y2="23.75"/>
    <line x1="18" y1="18" x2="18"    y2="29.5"/>
    <line x1="18" y1="18" x2="8.14"  y2="23.75"/>
    <line x1="18" y1="18" x2="8.14"  y2="12.25"/>
  </g>

  <!-- Hexagon outline -->
  <polygon points="18,6.5 27.86,12.25 27.86,23.75 18,29.5 8.14,23.75 8.14,12.25"
           fill="none" stroke="url(#warm)" stroke-width="1.7" stroke-linejoin="round"/>

  <!-- Vertex dots -->
  <g fill="#F4B23E">
    <circle cx="18"    cy="6.5"  r="2.1"/>
    <circle cx="27.86" cy="12.25" r="2.1"/>
    <circle cx="27.86" cy="23.75" r="2.1"/>
    <circle cx="18"    cy="29.5" r="2.1"/>
    <circle cx="8.14"  cy="23.75" r="2.1"/>
    <circle cx="8.14"  cy="12.25" r="2.1"/>
  </g>

  <!-- Centre hub -->
  <circle cx="18" cy="18" r="5" fill="url(#warm)"/>
  <circle cx="18" cy="18" r="2.2" fill="#FFF7EA"/>

  <!-- Wordmark -->
  <text x="46" y="25" font-family="'Poppins','Montserrat','Segoe UI',Arial,sans-serif"
        font-size="18" font-weight="600" letter-spacing="-0.6" fill="#13443B">Sahel<tspan fill="url(#warm)" font-weight="700">Hub</tspan></text>
</svg>
